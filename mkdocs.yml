site_name: theaios-guardrails
site_url: https://cohorte-ai.github.io/guardrails/
site_description: Declarative YAML-based policy engine for AI agent guardrails
site_author: Charafeddine Mouzouni
repo_url: https://github.com/Cohorte-ai/guardrails
repo_name: Cohorte-ai/guardrails

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Getting Started:
      - Concepts: concepts.md
      - Writing Policies: policy-syntax.md
      - Expression Language: expressions.md
  - Guides:
      - Matchers: matchers.md
      - Integration Guide: integration.md
      - Generate Policies with AI: ai-policy-generator.md
  - Reference:
      - CLI: cli.md
      - Python API: api-reference.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Cohorte-ai/guardrails

copyright: Copyright &copy; 2026 Charafeddine Mouzouni / Cohorte AI
